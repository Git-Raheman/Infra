apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: file-upload
spec:
  type: ClusterIP
  selector:
    app: file-backend
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: file-upload
spec:
  type: ClusterIP
  selector:
    app: file-frontend
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: file-upload
spec:
  type: ClusterIP
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: v1
kind: Service
metadata:
  name: file-nginx
  namespace: file-upload
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.50.82
  selector:
    app: file-nginx
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  namespace: file-upload
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-client
  resources:
    requests:
      storage: 5Gi
