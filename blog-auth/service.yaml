apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: blog-auth
spec:
  type: ClusterIP
  selector:
    app: blog-backend
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: blog-auth
spec:
  type: ClusterIP
  selector:
    app: blog-frontend
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: blog-auth
spec:
  type: ClusterIP
  selector:
    app: blog-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: blog-nginx
  namespace: blog-auth
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.50.80
  selector:
    app: blog-nginx
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: blog-db-pvc
  namespace: blog-auth
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-client
  resources:
    requests:
      storage: 1Gi
