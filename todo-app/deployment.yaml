apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app-backend
  namespace: todo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-app-backend
  template:
    metadata:
      labels:
        app: todo-app-backend
    spec:
      containers:
      - name: backend
        image: registry-raheman.in/todo-app-backend:7
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: PORT
          value: "5000"
        - name: MONGODB_URI
          value: "mongodb://admin:password@todo-app-db:27017/todoapp?authSource=admin"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app-frontend
  namespace: todo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-app-frontend
  template:
    metadata:
      labels:
        app: todo-app-frontend
    spec:
      containers:
      - name: frontend
        image: registry-raheman.in/todo-app-frontend:7
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app-nginx
  namespace: todo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-app-nginx
  template:
    metadata:
      labels:
        app: todo-app-nginx
    spec:
      containers:
      - name: nginx
        image: registry-raheman.in/todo-app-nginx:7
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app-db
  namespace: todo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-app-db
  template:
    metadata:
      labels:
        app: todo-app-db
    spec:
      containers:
      - name: mongodb
        image: mongo:latest
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: "admin"
        - name: MONGO_INITDB_ROOT_PASSWORD
          value: "password"
        volumeMounts:
        - name: db-data
          mountPath: /data/db
      volumes:
      - name: db-data
        hostPath:
          path: /data/todo-app
          type: DirectoryOrCreate
